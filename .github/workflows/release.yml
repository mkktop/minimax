name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

jobs:
  release:
    if: contains(github.event.head_commit.message, 'bump version')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release target: v$VERSION"

      - name: Check if release tag already exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/v${{ steps.version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.VERSION }} already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm install

      - name: Type check
        if: steps.check_tag.outputs.exists == 'false'
        run: npx tsc --noEmit

      - name: Compile
        if: steps.check_tag.outputs.exists == 'false'
        run: npx tsc -p ./

      - name: Package VSIX
        if: steps.check_tag.outputs.exists == 'false'
        run: npx vsce package --no-dependencies

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: '*.vsix'
