name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (leave empty to use package.json)'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine whether to release
        id: version
        run: |
          set -e
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "::notice::Using override version: $VERSION"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "::notice::Current package.json version: $VERSION"
          fi

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "")
          SHOULD_RELEASE="true"

          if [ -z "$LATEST_TAG" ]; then
            echo "::notice::No prior release tag found. Will release v$VERSION."
          elif [ "$VERSION" = "$LATEST_TAG" ]; then
            echo "::notice::Version v$VERSION matches latest release ($LATEST_TAG). Skipping."
            SHOULD_RELEASE="false"
          else
            echo "::notice::Version changed: v$LATEST_TAG → v$VERSION. Will release."
          fi

          if [ "$SHOULD_RELEASE" = "true" ] && git rev-parse "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "::warning::Tag v$VERSION already exists. Skipping."
            SHOULD_RELEASE="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.version.outputs.should_release == 'true'
        run: npm install

      - name: Type check
        if: steps.version.outputs.should_release == 'true'
        run: npx tsc --noEmit

      - name: Compile
        if: steps.version.outputs.should_release == 'true'
        run: npx tsc -p ./

      - name: Package VSIX
        if: steps.version.outputs.should_release == 'true'
        run: npx vsce package --no-dependencies

      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: '*.vsix'
